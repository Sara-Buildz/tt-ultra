<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT ULTRA | Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(rgba(59, 28, 99, 0.9), rgba(59, 28, 99, 0.9)), 
                        url('https://images.unsplash.com/photo-1534158914592-062992fbe900?q=80&w=1500');
            background-size: cover; min-height: 100vh; color: #3B1C63;
            transition: background 0.3s ease;
        }
        
        /* --- NAVIGATION BAR STYLES --- */
        nav { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .main-nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; gap: 24px; background: white; }
        .logo { font-size: 30px; font-weight: 900; color: #3B1C63; text-transform: uppercase; text-decoration: none;}
        .nav-links { display: flex; align-items: center; justify-content: flex-end; gap: 24px; flex-wrap: wrap; min-width: 0; }
        .nav-links a { text-decoration: none; color: #3B1C63; font-weight: 700; }
        .wallet-connect { padding: 10px 16px; border: none; border-radius: 10px; background: #FF1F8A; color: white; font-weight: 800; cursor: pointer; white-space: nowrap; }
        .wallet-status { color: #3B1C63; font-size: 0.85rem; font-weight: 700; white-space: nowrap; }

        /* --- SIGNUP FORM STYLES --- */
        .form-container { display: flex; justify-content: center; padding: 50px 20px; }
        .signup-card { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 500px; box-shadow: 15px 15px 0px #C6FF5E; border: 2px solid #3B1C63; transition: 0.3s; }
        h2 { margin-bottom: 20px; text-transform: uppercase; font-weight: 900; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 11px; font-weight: 900; margin-bottom: 5px; color: #FF1F8A; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: #3B1C63; }
        
        input:disabled {
            background: #f5f5f5 !important;
            color: rgba(59, 28, 99, 0.4) !important;
            cursor: not-allowed;
            border-color: #e2e2e2 !important;
        }
        
        .btn-reg { background: #FF1F8A; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 20px; }
        .login-link { display: block; margin-top: 15px; font-size: 13px; text-decoration: none; color: #3B1C63; font-weight: 700; }

        /* --- DARK MODE STYLES --- */
        body.dark { background: #121212 !important; background-image: none !important; color: white !important; }
        body.dark .main-nav { background: #1e1e1e !important; }
        body.dark .logo, body.dark .nav-links a { color: white !important; }
        body.dark .wallet-status { color: white; }
        body.dark .signup-card { background: #1e1e1e !important; color: white !important; border-color: #C6FF5E !important; }
        body.dark input { background: #2a2a2a !important; color: white !important; border-color: #444 !important; }
        body.dark input:disabled { background: #161616 !important; color: #555 !important; border-color: #222 !important; }
        body.dark .login-link { color: #C6FF5E !important; }
    </style>
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>

    <button id="themeToggle" style="position:fixed;top:20px;right:20px;z-index:999;padding:10px 12px;border:none;border-radius:10px;background:#FF1F8A;color:white;font-weight:bold;cursor:pointer;">
        🌙
    </button>

    <nav>
        <div class="main-nav">
            <a href="index.html" class="logo">TT<span style="color:#FF1F8A">ULTRA</span></a>
            <div class="nav-links">
                <a href="index.html">HOME</a>
                <a href="signup.html">REGISTER</a>
                <a href="login.html" id="loginLink">LOGIN</a>
                <a href="teams.html">TEAMS</a>
                <button type="button" id="connectWalletBtn" class="wallet-connect">Connect MetaMask</button>
                <span id="walletStatus" class="wallet-status"></span>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="signup-card">
            <h2>CREATE <span style="color:#FF1F8A">ACCOUNT</span></h2>
            <form id="signupForm" novalidate>
                <div class="form-group">
                    <label>FIRST NAME</label>
                    <input type="text" id="fname" placeholder="John">
                </div>
                <div class="form-group">
                    <label>LAST NAME</label>
                    <input type="text" id="lname" placeholder="Doe">
                </div>
                <div class="form-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" id="email" placeholder="player@ttultra.com">
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" id="pass">
                </div>
                <button type="submit" class="btn-reg">SIGN UP NOW</button>
                <a href="login.html" class="login-link">Already a member? Login here</a>
            </form>
        </div>
    </div>

    <script>
        // --- 1. THEME TOGGLE LOGIC ---
        const themeBtn = document.getElementById('themeToggle');
        const body = document.body;

        if (localStorage.getItem('tt_theme') === 'dark') {
            body.classList.add('dark');
            themeBtn.innerText = "☀️";
        }

        themeBtn.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            localStorage.setItem('tt_theme', isDark ? 'dark' : 'light');
            themeBtn.innerText = isDark ? "☀️" : "🌙";
        });

        // --- 2. ADVANCED SIGNUP VALIDATION & LOCK SYSTEM ---
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const form = document.getElementById('signupForm');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('pass');

        if (form && emailInput && passInput) {
            passInput.disabled = true;
            passInput.placeholder = "🔒 Enter valid email first...";

            emailInput.addEventListener('input', () => {
                if (emailRegex.test(emailInput.value.trim())) {
                    passInput.disabled = false;
                    passInput.placeholder = ""; 
                } else {
                    passInput.disabled = true;
                    passInput.value = ''; 
                    passInput.placeholder = "🔒 Enter valid email first...";
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const pass = passInput.value;
                const fname = document.getElementById('fname').value.trim();

                if (!emailRegex.test(email)) return alert("Please enter a valid email address");
                if (pass.length < 8) return alert("at least enter an 8-digit password");
                if (!pass.includes('F') && !pass.includes('f')) {
    return alert("Password must contain F to pay respect 🫡");
}
                if (!fname) return alert("Please fill all fields correctly.");

                const userObj = { firstName: fname, email: email, password: pass };
                let users = JSON.parse(localStorage.getItem("tt_users")) || [];
                users.push(userObj);
                localStorage.setItem("tt_users", JSON.stringify(users));
                
                alert("Account Created Successfully!");
                window.location.href = "login.html";
            });
        }

        // --- 3. METAMASK WALLET LOGIC ---
        const walletBtn = document.getElementById('connectWalletBtn');
        const walletStatus = document.getElementById('walletStatus');

        function shortAddress(address) { return address.slice(0, 6) + '...' + address.slice(-4); }
        function showConnectedWallet(address) { walletStatus.textContent = shortAddress(address); }

        async function checkConnectedWallet() {
            if (!window.ethereum) return;
            try {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts[0]) showConnectedWallet(accounts[0]);
            } catch (error) { console.warn('Unable to check connected wallet:', error); }
        }

        checkConnectedWallet();

        walletBtn.addEventListener('click', async () => {
            if (!window.ethereum) {
                walletStatus.textContent = 'MetaMask is not installed.';
                return;
            }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts[0]) {
                    showConnectedWallet(accounts[0]);
                    walletBtn.textContent = 'Connected';
                }
            } catch (error) {
                walletStatus.textContent = 'Wallet connection cancelled.';
            }
        });
    </script>
    <script src="chatbot.js" defer></script>
</body>
</html>
