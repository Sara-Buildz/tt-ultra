<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT ULTRA | Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(rgba(59, 28, 99, 0.9), rgba(59, 28, 99, 0.9)), 
                        url('https://images.unsplash.com/photo-1534158914592-062992fbe900?q=80&w=1500');
            background-size: cover; min-height: 100vh; color: #3B1C63;
            transition: background 0.3s ease; /* Smooth transition */
        }
        .main-nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: white; }
        .logo { font-size: 30px; font-weight: 900; color: #3B1C63; text-transform: uppercase; text-decoration: none;}
        .form-container { display: flex; justify-content: center; padding: 50px 20px; }
        .signup-card { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 500px; box-shadow: 15px 15px 0px #C6FF5E; border: 2px solid #3B1C63; transition: 0.3s; }
        h2 { margin-bottom: 20px; text-transform: uppercase; font-weight: 900; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 11px; font-weight: 900; margin-bottom: 5px; color: #FF1F8A; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: #3B1C63; }
        .error { color: red; font-size: 11px; margin-top: 4px; display: none; }
        .valid-msg { color: green; font-size: 11px; margin-top: 4px; display: none; }
        .strength-container { height: 8px; width: 100%; background: #eee; margin-top: 8px; border-radius: 10px; overflow: hidden; }
        #strength-bar { height: 100%; width: 0%; transition: 0.5s; }
        .btn-reg { background: #FF1F8A; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 20px; }
        .login-link { display: block; margin-top: 15px; font-size: 13px; text-decoration: none; color: #3B1C63; font-weight: 700; }

        /* DARK MODE STYLES */
        body.dark {
            background: #121212 !important;
            background-image: none !important;
            color: white !important;
        }
        body.dark .signup-card {
            background: #1e1e1e !important;
            color: white !important;
            border-color: #C6FF5E !important;
        }
        body.dark .main-nav { background: #1e1e1e !important; }
        body.dark .logo { color: white !important; }
        body.dark input {
            background: #2a2a2a !important;
            color: white !important;
            border-color: #444 !important;
        }
        body.dark .login-link { color: #C6FF5E !important; }
    </style>
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>

<button id="themeToggle" style="position:fixed;top:20px;right:20px;z-index:999;padding:10px 12px;border:none;border-radius:10px;background:#FF1F8A;color:white;font-weight:bold;cursor:pointer;">
    🌙
</button>

<div class="main-nav">
    <a href="index.html" class="logo">TT<span style="color:#FF1F8A">ULTRA</span></a>
</div>

<div class="form-container">
    <div class="signup-card">
        <h2>CREATE <span style="color:#FF1F8A">ACCOUNT</span></h2>
        <form id="signupForm">
            <div class="form-group">
                <label>FIRST NAME</label>
                <input type="text" id="fname" placeholder="John">
            </div>
            <div class="form-group">
                <label>LAST NAME</label>
                <input type="text" id="lname" placeholder="Doe">
            </div>
            <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="email" placeholder="player@ttultra.com">
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="pass">
            </div>
            <button type="submit" class="btn-reg">SIGN UP NOW</button>
            <a href="login.html" class="login-link">Already a member? Login here</a>
        </form>
    </div>
</div>

<script>
    // 1. THEME TOGGLE LOGIC (FIXED)
    const themeBtn = document.getElementById('themeToggle');
    const body = document.body;

    // Check if user has a saved preference
    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark');
        themeBtn.innerText = "☀️";
    }

    themeBtn.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        
        // Save choice to localStorage
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        // Change icon
        themeBtn.innerText = isDark ? "☀️" : "🌙";
    });

    // 2. SIGNUP FORM LOGIC
    const form = document.getElementById('signupForm');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const fname = document.getElementById('fname').value;

        if (email && pass && fname) {
            const userObj = { firstName: fname, email: email, password: pass };
            let users = JSON.parse(localStorage.getItem("tt_users")) || [];
            users.push(userObj);
            localStorage.setItem("tt_users", JSON.stringify(users));
            alert("Account Created Successfully!");
            window.location.href = "login.html";
        } else {
            alert("Please fill all fields correctly.");
        }
    });
</script>
    <script src="chatbot.js" defer></script>
</body>
</html>
