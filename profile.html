<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT ULTRA | Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(rgba(59, 28, 99, 0.9), rgba(59, 28, 99, 0.9)),
                        url('https://images.unsplash.com/photo-1534158914592-062992fbe900?q=80&w=1500');
            background-size: cover; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding-top: 90px; padding-bottom: 50px;
            transition: background 0.3s ease;
        }

        /* --- NAV --- */
        nav { width: 100%; position: fixed; top: 0; left: 0; z-index: 100; }
        .main-nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; gap: 24px; background: white; border-bottom: 2px solid #C6FF5E; transition: 0.3s; }
        .logo { font-size: 30px; font-weight: 900; color: #3B1C63; text-decoration: none; text-transform: uppercase; }
        .nav-links { display: flex; align-items: center; justify-content: flex-end; gap: 24px; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #3B1C63; font-weight: 700; transition: color 0.3s; }
        .nav-links a:hover { color: #FF1F8A; }

        /* --- PROFILE CARD --- */
        .profile-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 50px; border-radius: 40px; width: 100%; max-width: 500px;
            text-align: center; color: white; transition: 0.3s;
        }
        .avatar {
            width: 90px; height: 90px; border-radius: 50%;
            background: #FF1F8A; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; margin: 0 auto 20px auto;
            border: 4px solid #C6FF5E;
        }
        .profile-name { font-size: 2rem; font-weight: 900; margin-bottom: 5px; }
        .profile-email { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .profile-badge {
            background: #FF1F8A; color: white; padding: 6px 20px;
            border-radius: 50px; font-size: 12px; font-weight: 800;
            display: inline-block; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- INFO ROWS --- */
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.1); border-radius: 12px;
            padding: 14px 20px; margin-bottom: 12px; text-align: left;
        }
        .info-label { font-size: 11px; font-weight: 800; color: #C6FF5E; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 14px; font-weight: 700; color: white; }

        /* --- THEME SELECTOR --- */
        .theme-section { margin-top: 25px; }
        .theme-section p { font-size: 12px; font-weight: 800; color: #C6FF5E; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .theme-options { display: flex; gap: 10px; justify-content: center; }
        .theme-opt {
            padding: 10px 22px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.3);
            background: transparent; color: white; font-weight: 700; cursor: pointer; font-size: 13px; transition: 0.3s;
        }
        .theme-opt.active, .theme-opt:hover { background: #FF1F8A; border-color: #FF1F8A; }

        /* --- LOGOUT BTN --- */
        .logout-btn {
            margin-top: 30px; width: 100%; padding: 16px;
            background: transparent; border: 2px solid rgba(255,255,255,0.4);
            color: white; border-radius: 12px; font-weight: 900; cursor: pointer;
            font-size: 15px; transition: 0.3s;
        }
        .logout-btn:hover { background: #FF1F8A; border-color: #FF1F8A; }

        /* --- NOT LOGGED IN --- */
        #notLoggedIn { display: none; justify-content: center; align-items: center; width: 100%; }
        #notLoggedIn .profile-card { }
        #notLoggedIn p { margin-bottom: 20px; font-size: 15px; color: rgba(255,255,255,0.8); }
        .go-login {
            display: inline-block; padding: 16px 40px; background: #FF1F8A;
            color: white; border-radius: 12px; font-weight: 900; text-decoration: none;
            font-size: 15px; transition: 0.3s;
        }
        .go-login:hover { background: #C6FF5E; color: #3B1C63; }

        /* --- DARK MODE --- */
        body.dark { background: #121212 !important; background-image: none !important; }
        body.dark .main-nav { background: #1e1e1e; border-bottom: 2px solid #FF1F8A; }
        body.dark .logo, body.dark .nav-links a { color: white; }
        body.dark .profile-card { background: rgba(0,0,0,0.6); border-color: #444; }
        body.dark .info-row { background: rgba(255,255,255,0.05); }
    </style>
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>

    <nav>
        <div class="main-nav">
            <a href="index.html" class="logo">TT<span style="color:#FF1F8A">ULTRA</span></a>
            <div class="nav-links">
                <a href="index.html">HOME</a>
                <a href="schedule.html">SCHEDULE</a>
                <a href="players.html">ATHLETES</a>
                <a href="teams.html">TEAMS</a>
                <a href="contact.html">SUPPORT</a>
                <a href="join.html">REGISTER</a>
            </div>
        </div>
    </nav>

    <button id="themeToggle" style="position:fixed;top:20px;right:20px;padding:10px 15px;border-radius:10px;border:none;background:#FF1F8A;color:white;font-weight:bold;cursor:pointer;z-index:999;">🌙</button>

    <!-- LOGGED IN VIEW -->
    <div id="profileView" style="display:flex; justify-content:center; width:100%;">
        <div class="profile-card">
            <div class="avatar" id="avatarInitial">?</div>
            <div class="profile-name" id="profileName">Loading...</div>
            <div class="profile-email" id="profileEmail"></div>
            <div class="profile-badge">COMPETITOR</div>

            <div class="info-row">
                <span class="info-label">First Name</span>
                <span class="info-value" id="infoFirstName">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" id="infoEmail">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Member Since</span>
                <span class="info-value" id="infoJoined">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Role</span>
                <span class="info-value">Competitor</span>
            </div>

            <div class="theme-section">
                <p>Personalized Theme</p>
                <div class="theme-options">
                    <button class="theme-opt" id="themeLight" onclick="setUserTheme('light')">☀️ Light</button>
                    <button class="theme-opt" id="themeDark" onclick="setUserTheme('dark')">🌙 Dark</button>
                </div>
            </div>

            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <!-- NOT LOGGED IN VIEW -->
    <div id="notLoggedIn">
        <div class="profile-card">
            <div style="font-size:3rem; margin-bottom:20px;">🔒</div>
            <h2 style="margin-bottom:15px;">NOT LOGGED IN</h2>
            <p>You need to login to view your profile.</p>
            <a href="login.html" class="go-login">GO TO LOGIN</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
            ? 'http://localhost:3000'
            : 'https://tt-ultra-production.up.railway.app';

        const sessionUser = JSON.parse(sessionStorage.getItem('activeUser') || 'null');

        // Theme toggle button
        const themeBtn = document.getElementById('themeToggle');
        if (localStorage.getItem('tt_theme') === 'dark') {
            document.body.classList.add('dark');
            themeBtn.innerText = '☀️';
            document.getElementById('themeDark').classList.add('active');
        } else {
            document.getElementById('themeLight').classList.add('active');
        }
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('tt_theme', isDark ? 'dark' : 'light');
            themeBtn.innerText = isDark ? '☀️' : '🌙';
        });

        // Check if logged in
        if (!sessionUser) {
            document.getElementById('profileView').style.display = 'none';
            document.getElementById('notLoggedIn').style.display = 'flex';
        } else {
            loadProfile(sessionUser.email);
        }

        async function loadProfile(email) {
            try {
                const res = await fetch(`${API_BASE}/api/auth/profile/${encodeURIComponent(email)}`);
                const user = await res.json();

                if (!res.ok) throw new Error(user.error);

                // Populate UI
                const initial = (user.firstName || '?')[0].toUpperCase();
                document.getElementById('avatarInitial').textContent = initial;
                document.getElementById('profileName').textContent = user.firstName.toUpperCase();
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('infoFirstName').textContent = user.firstName;
                document.getElementById('infoEmail').textContent = user.email;
                document.getElementById('infoJoined').textContent = user.createdAt
                    ? new Date(user.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
                    : '—';

                // Apply saved theme
                const savedTheme = user.theme || 'light';
                localStorage.setItem('tt_theme', savedTheme);
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark');
                    themeBtn.innerText = '☀️';
                    document.getElementById('themeDark').classList.add('active');
                    document.getElementById('themeLight').classList.remove('active');
                } else {
                    document.body.classList.remove('dark');
                    themeBtn.innerText = '🌙';
                    document.getElementById('themeLight').classList.add('active');
                    document.getElementById('themeDark').classList.remove('active');
                }

            } catch (e) {
                console.error('Profile load error:', e);
                document.getElementById('profileName').textContent = sessionUser.email;
                document.getElementById('profileEmail').textContent = sessionUser.email;
                document.getElementById('infoEmail').textContent = sessionUser.email;
                document.getElementById('avatarInitial').textContent = sessionUser.email[0].toUpperCase();
            }
        }

        async function setUserTheme(theme) {
            // Update UI immediately
            if (theme === 'dark') {
                document.body.classList.add('dark');
                themeBtn.innerText = '☀️';
                document.getElementById('themeDark').classList.add('active');
                document.getElementById('themeLight').classList.remove('active');
            } else {
                document.body.classList.remove('dark');
                themeBtn.innerText = '🌙';
                document.getElementById('themeLight').classList.add('active');
                document.getElementById('themeDark').classList.remove('active');
            }
            localStorage.setItem('tt_theme', theme);

            // Save to MongoDB
            if (!sessionUser) return;
            try {
                await fetch(`${API_BASE}/api/auth/profile/${encodeURIComponent(sessionUser.email)}/theme`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ theme })
                });
            } catch (e) {
                console.error('Theme save error:', e);
            }
        }

        function logout() {
            sessionStorage.removeItem('activeUser');
            window.location.href = 'login.html';
        }
    </script>
    <script src="chatbot.js" defer></script>
</body>
</html>
